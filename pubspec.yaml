name: glowvita
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  geocoding: ^4.0.0
  intl: ^0.19.0 # for current date
  flutter_screenutil: ^5.9.3 # for responsiveness 
  google_fonts: ^6.3.0
  image_picker: ^1.0.7
  file_picker: ^10.0.0
  url_launcher: ^6.2.5
  open_file: ^3.3.3
  font_awesome_flutter: ^10.7.0
  csv: ^6.0.0
  path_provider: ^2.1.5
  geolocator: ^11.1.0
  flutter_typeahead: ^5.1.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^6.0.3
  http: ^1.2.2
  pdf: ^3.11.3
  printing: ^5.14.2
  flutter_launcher_icons: ^0.13.1
  rename: ^2.1.1
  timeline_tile: ^2.0.0
  cupertino_icons: ^1.0.8
  flutter_slidable: ^4.0.3
  google_maps_flutter: ^2.14.2
  change_app_package_name: ^1.5.0
  excel: ^4.0.6
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^18.0.1
  razorpay_flutter: ^1.4.1
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
    
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/favicon.png"
  image_path: "assets/images/favicon.png"  # your logo file
  adaptive_icon_background: "#FFFFFF"   # background color for Android

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - .env
